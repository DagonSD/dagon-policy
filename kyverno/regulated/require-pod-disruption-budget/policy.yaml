apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-pod-disruption-budget
  annotations:
    policies.kyverno.io/title: "Require PodDisruptionBudget Annotation on Deployments"
    policies.kyverno.io/category: "Availability"
    policies.kyverno.io/severity: "medium"
    policies.kyverno.io/subject: "Deployment"
    policies.kyverno.io/controls: "SOC2-CC7.1, HIPAA-164.312"
    policies.kyverno.io/description: >-
      Deployments in regulated namespaces must have a corresponding
      PodDisruptionBudget (PDB) to guarantee availability during cluster
      maintenance and voluntary disruptions (SOC2 CC7.1). This policy
      validates that the Deployment carries the annotation
      dagon.io/pdb: "managed" indicating that a PDB has been applied by
      the platform. Fix: ensure your Backstage template includes a PDB
      resource, or ask the platform team to apply one.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-pdb-annotation
      match:
        any:
          - resources:
              kinds:
                - Deployment
              namespaceSelector:
                matchExpressions:
                  - key: dagon.io/managed
                    operator: In
                    values:
                      - "true"
                  - key: dagon.io/compliance-tier
                    operator: In
                    values:
                      - "soc2"
                      - "hipaa"
                      - "gdpr"
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno
                - argo-system
                - cert-manager
                - external-secrets
      validate:
        message: >-
          Deployment '{{ request.object.metadata.name }}' in namespace
          '{{ request.object.metadata.namespace }}' is missing the
          annotation dagon.io/pdb: "managed" (SOC2 CC7.1, HIPAA §164.312).
          A PodDisruptionBudget is required to protect availability during
          node maintenance. Ensure your Backstage template applies a PDB,
          or contact the platform team.
        pattern:
          metadata:
            annotations:
              dagon.io/pdb: "managed"

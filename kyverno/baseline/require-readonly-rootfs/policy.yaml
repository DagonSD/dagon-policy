apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-readonly-rootfs
  annotations:
    policies.kyverno.io/title: "Require Read-Only Root Filesystem"
    policies.kyverno.io/category: "Pod Security"
    policies.kyverno.io/severity: "medium"
    policies.kyverno.io/subject: "Pod"
    policies.kyverno.io/controls: "SOC2-CC6.6, CIS-K8S-5.2.4"
    policies.kyverno.io/description: >-
      Containers must use a read-only root filesystem to prevent an attacker
      from writing malicious binaries or altering runtime behaviour (SOC2
      CC6.6). Fix: set securityContext.readOnlyRootFilesystem: true on the
      container. Mount writable paths explicitly via emptyDir or PVC volumes.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-readonly-rootfs
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno
                - argo-system
                - cert-manager
                - external-secrets
      validate:
        message: >-
          Pod '{{ request.object.metadata.name }}' has a container without
          readOnlyRootFilesystem: true. A writable root filesystem allows
          runtime file tampering (SOC2 CC6.6). Set
          securityContext.readOnlyRootFilesystem: true on every container
          and mount writable paths via volume mounts.
        foreach:
          - list: "request.object.spec.containers"
            pattern:
              securityContext:
                readOnlyRootFilesystem: true

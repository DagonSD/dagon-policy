apiVersion: v1
kind: Namespace
metadata:
  name: team-alpha
  labels:
    dagon.io/managed: "true"
    dagon.io/tenant-id: "11111111-1111-1111-1111-111111111111"
    dagon.io/compliance-tier: "soc2"
    dagon.io/environment: "dev"
---
apiVersion: v1
kind: Pod
metadata:
  name: pod-without-limits
  namespace: team-alpha
spec:
  containers:
    - name: app
      image: nginx:1.25.3
---
apiVersion: v1
kind: Pod
metadata:
  name: pod-with-requests-only
  namespace: team-alpha
spec:
  containers:
    - name: app
      image: nginx:1.25.3
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
---
apiVersion: v1
kind: Pod
metadata:
  name: pod-with-limits
  namespace: team-alpha
spec:
  containers:
    - name: app
      image: nginx:1.25.3
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"

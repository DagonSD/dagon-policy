apiVersion: v1
kind: Namespace
metadata:
  name: team-alpha
  labels:
    dagon.io/managed: "true"
    dagon.io/tenant-id: "11111111-1111-1111-1111-111111111111"
    dagon.io/compliance-tier: "soc2"
    dagon.io/environment: "dev"
---
apiVersion: v1
kind: Pod
metadata:
  name: pod-privileged-true
  namespace: team-alpha
spec:
  containers:
    - name: app
      image: nginx:1.25.3
      securityContext:
        privileged: true
---
apiVersion: v1
kind: Pod
metadata:
  name: pod-privileged-false
  namespace: team-alpha
spec:
  containers:
    - name: app
      image: nginx:1.25.3
      securityContext:
        privileged: false
---
apiVersion: v1
kind: Pod
metadata:
  name: pod-no-privilege-field
  namespace: team-alpha
spec:
  containers:
    - name: app
      image: nginx:1.25.3
